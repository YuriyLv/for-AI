<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for-AI · Навчання (архів)</title>
<style>
  :root {
    --bg:#0d1117; --bg2:#11161d; --card:#161b22; --border:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --accent2:#3fb950;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%, #16202c 0%, var(--bg) 55%);
    color:var(--fg); min-height:100vh; padding:32px 16px 64px;
  }
  .wrap { max-width:920px; margin:0 auto; }
  header { text-align:center; margin-bottom:20px; }
  h1 { font-size:1.9rem; letter-spacing:-.02em; }
  .sub { color:var(--muted); margin-top:6px; font-size:.95rem; }
  .updated { display:inline-block; margin-top:12px; font-size:.8rem; color:var(--muted);
    border:1px solid var(--border); border-radius:999px; padding:4px 12px; }
  .back { display:inline-block; margin-bottom:6px; color:var(--accent);
    text-decoration:none; font-size:.9rem; font-weight:600; }
  .back:hover { opacity:.85; }
  .controls { position:sticky; top:0; z-index:5; background:rgba(13,17,23,.92);
    backdrop-filter:blur(6px); padding:14px 0 12px; margin-bottom:8px; }
  .search { margin:0 auto 12px; max-width:520px; }
  .search input {
    width:100%; padding:12px 16px; border-radius:12px; border:1px solid var(--border);
    background:var(--bg2); color:var(--fg); font-size:1rem; outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  .search input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(88,166,255,.18); }
  .filters { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; max-width:820px; margin:0 auto; }
  .chip { padding:7px 14px; border-radius:999px; border:1px solid var(--border);
    background:var(--bg2); color:var(--muted); font-size:.82rem; cursor:pointer;
    transition:all .15s; font-family:inherit; }
  .chip:hover { color:var(--fg); border-color:var(--accent); }
  .chip.active { background:rgba(88,166,255,.16); color:var(--accent); border-color:var(--accent); font-weight:600; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; margin-top:18px; }
  .card {
    display:block; text-decoration:none; color:inherit; background:var(--card);
    border:1px solid var(--border); border-radius:16px; padding:18px 18px 14px;
    transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover { transform:translateY(-3px); border-color:var(--accent);
    box-shadow:0 10px 30px rgba(0,0,0,.35); }
  .card-head { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .card-title { font-weight:650; font-size:1.05rem; }
  .card-date { font-size:.72rem; color:var(--muted); white-space:nowrap; }
  .card-desc { color:var(--muted); font-size:.85rem; margin-top:8px; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-go { margin-top:12px; color:var(--accent); font-size:.85rem; font-weight:600; }
  .pager { display:flex; gap:6px; justify-content:center; margin-top:28px; flex-wrap:wrap; }
  .pager button { min-width:40px; padding:9px 12px; border-radius:10px; border:1px solid var(--border);
    background:var(--bg2); color:var(--fg); font-size:.88rem; cursor:pointer; font-family:inherit;
    transition:all .15s; }
  .pager button:hover { border-color:var(--accent); }
  .pager button.active { background:var(--accent); color:#0d1117; border-color:var(--accent); font-weight:700; }
  .pager button:disabled { opacity:.4; cursor:default; }
  .empty { color:var(--muted); text-align:center; padding:40px; grid-column:1/-1; }
  footer { text-align:center; color:#6e7681; font-size:.78rem; margin-top:40px; }
  mark { background:rgba(88,166,255,.28); color:var(--fg); border-radius:3px; padding:0 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <a class="back" href="index.html">← На головну</a>
      <h1>📚 Навчання (growth-coach)</h1>
      <div class="sub">Повний архів навчальних матеріалів · фільтруй за категорією, шукай, гортай сторінки</div>
      <div class="updated">Оновлено: 16.07.2026 12:01 UTC</div>
    </header>

    <div class="controls">
      <div class="search">
        <input id="q" type="text" placeholder="🔎 Пошук по матеріалах…" autocomplete="off" aria-label="Пошук">
      </div>
      <div class="filters" id="filters">
      <button class="chip active" data-filter="all">Усі (0)</button>
      </div>
    </div>

    <div class="grid" id="grid">
    <div class="empty">Поки немає навчальних матеріалів.</div>
    </div>

    <div class="pager" id="pager"></div>

    <footer>Згенеровано Hermes Agent · автоматичний пайплайн публікації</footer>
  </div>

  <script>
    const PAGE_SIZE = 24;
    const grid = document.getElementById('grid');
    const q = document.getElementById('q');
    const pager = document.getElementById('pager');
    const chips = Array.from(document.querySelectorAll('.chip'));
    let cards = Array.from(grid.querySelectorAll('.card'));
    let activeFilter = 'all';
    let activePage = 1;

    // regex-безпечний ескейп для пошуку
    function esc(t) { return t.replace(/[.*+?^${}()|[]\\]/g, '\\$&'); }

    function applyFilter() {
      const term = q.value.trim().toLowerCase();
      cards.forEach(c => {
        const slot = c.getAttribute('data-slot') || '';
        const text = c.textContent.toLowerCase();
        const matchFilter = activeFilter === 'all' || slot === activeFilter;
        const matchTerm = !term || text.includes(term);
        const visible = matchFilter && matchTerm;
        c.style.display = visible ? '' : 'none';
        if (term && visible) {
          c.querySelectorAll('.card-title,.card-desc').forEach(el => {
            const re = new RegExp('('+esc(term)+')','ig');
            el.innerHTML = el.textContent.replace(re, '<mark>$1</mark>');
          });
        } else {
          c.querySelectorAll('.card-title,.card-desc').forEach(el => { el.innerHTML = el.textContent; });
        }
      });
    }

    function renderPage() {
      applyFilter();
      const visible = cards.filter(c => c.style.display !== 'none');
      const totalPages = Math.max(1, Math.ceil(visible.length / PAGE_SIZE));
      if (activePage > totalPages) activePage = totalPages;
      visible.forEach((c, i) => {
        c.style.display = (i >= (activePage-1)*PAGE_SIZE && i < activePage*PAGE_SIZE) ? '' : 'none';
      });
      // пагер
      pager.innerHTML = '';
      if (totalPages <= 1) return;
      const prev = document.createElement('button');
      prev.textContent = '←'; prev.disabled = activePage === 1;
      prev.onclick = () => { activePage--; renderPage(); };
      pager.appendChild(prev);
      const windowSize = 5;
      let start = Math.max(1, activePage - 2);
      let end = Math.min(totalPages, start + windowSize - 1);
      start = Math.max(1, end - windowSize + 1);
      for (let p = start; p <= end; p++) {
        const b = document.createElement('button');
        b.textContent = p;
        if (p === activePage) b.classList.add('active');
        b.onclick = () => { activePage = p; renderPage(); };
        pager.appendChild(b);
      }
      const next = document.createElement('button');
      next.textContent = '→'; next.disabled = activePage === totalPages;
      next.onclick = () => { activePage++; renderPage(); };
      pager.appendChild(next);
    }

    chips.forEach(ch => {
      ch.onclick = () => {
        chips.forEach(c => c.classList.remove('active'));
        ch.classList.add('active');
        activeFilter = ch.getAttribute('data-filter');
        activePage = 1;
        renderPage();
      };
    });

    q.addEventListener('input', () => { activePage = 1; renderPage(); });
    renderPage();
  </script>
</body>
</html>
