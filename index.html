<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for-AI · Навігація</title>
<style>
  :root {
    --bg:#0d1117; --bg2:#11161d; --card:#161b22; --border:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --accent2:#3fb950;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%, #16202c 0%, var(--bg) 55%);
    color:var(--fg); min-height:100vh; padding:32px 16px 64px;
  }
  .wrap { max-width:920px; margin:0 auto; }
  header { text-align:center; margin-bottom:28px; }
  h1 { font-size:1.9rem; letter-spacing:-.02em; }
  .sub { color:var(--muted); margin-top:6px; font-size:.95rem; }
  .updated { display:inline-block; margin-top:12px; font-size:.8rem; color:var(--muted);
    border:1px solid var(--border); border-radius:999px; padding:4px 12px; }
  .sec { font-size:1.15rem; margin:34px 0 4px; color:#fff; font-weight:650; }
  .sec:first-of-type { margin-top:24px; }
  .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px,1fr)); gap:16px; margin-top:16px; }
  .card {
    display:block; text-decoration:none; color:inherit; background:var(--card);
    border:1px solid var(--border); border-radius:16px; padding:18px 18px 14px;
    transition:transform .15s, border-color .15s, box-shadow .15s;
  }
  .card:hover { transform:translateY(-3px); border-color:var(--accent);
    box-shadow:0 10px 30px rgba(0,0,0,.35); }
  .card-head { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .card-title { font-weight:650; font-size:1.05rem; }
  .card-date { font-size:.72rem; color:var(--muted); white-space:nowrap; }
  .card-desc { color:var(--muted); font-size:.85rem; margin-top:8px; line-height:1.45;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .card-go { margin-top:12px; color:var(--accent); font-size:.85rem; font-weight:600; }
  .more { margin-top:18px; text-align:center; }
  .more-btn { display:inline-block; padding:11px 22px; border:1px solid var(--accent);
    border-radius:12px; color:var(--accent); text-decoration:none; font-weight:650;
    font-size:.92rem; transition:background .15s; }
  .more-btn:hover { background:rgba(88,166,255,.12); }
  .empty { color:var(--muted); text-align:center; padding:40px; }
  footer { text-align:center; color:#6e7681; font-size:.78rem; margin-top:40px; }
  mark { background:rgba(88,166,255,.28); color:var(--fg); border-radius:3px; padding:0 2px; }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>📂 for-AI · Навігація</h1>
      <div class="sub">Автоматично згенеровані звіти й навчальні матеріали — відкрий у один клік</div>
      <div class="updated">Оновлено: 16.07.2026 12:01 UTC</div>
    </header>

    <h2 class="sec">📊 Звіти (Pulse)</h2>
    <div class="grid">
      <a class="card" href="pulse-report.html" data-slot="" target="_blank" rel="noopener">
        <div class="card-head">
          <span class="card-title">Pulse report</span>
          <span class="card-date">16.07.2026 10:42</span>
        </div>
        <div class="card-desc">Pulse — системний біограф</div>
        <div class="card-go">Відкрити →</div>
      </a>
    </div>
    <footer>Згенеровано Hermes Agent · автоматичний пайплайн публікації</footer>
  </div>
</body>
</html>
